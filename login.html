<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Library Tracker</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/auth.js" defer></script>
</head>
<body>
    <main class="auth-shell">
        <section class="card auth-card">
            <h2 class="auth-title">Login</h2>
            <p class="auth-text">Sign in to continue to the library finance dashboard.</p>

            <form id="loginForm" class="entry-form auth-form">
                <div class="form-field form-field-wide">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>

                <div class="form-field form-field-wide">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>

                <button id="loginBtn" type="submit" class="btn btn-primary form-field-wide">Login</button>
            </form>

            <p class="auth-footer">
                Don't have an account?
                <a href="signup.html">Create one</a>
            </p>
        </section>
    </main>
</body>
</html>
